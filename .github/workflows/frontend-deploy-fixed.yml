name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          set -e
          test -n "$VITE_API_URL"
          npm run build
          test -f dist/index.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Verify deployment secrets
        shell: bash
        run: |
          set -e
          test -n "${{ secrets.S3_BUCKET_NAME }}"
          test -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"

      - name: Sync static assets to S3
        working-directory: ./frontend
        run: |
          set -e
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "vite.svg"

      - name: Upload index.html with no-cache
        working-directory: ./frontend
        run: |
          set -e
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Upload vite.svg with shorter cache
        working-directory: ./frontend
        run: |
          set -e
          if [ -f dist/vite.svg ]; then
            aws s3 cp dist/vite.svg s3://${{ secrets.S3_BUCKET_NAME }}/vite.svg \
              --cache-control "public,max-age=86400" \
              --content-type "image/svg+xml"
          fi

      - name: Invalidate CloudFront cache
        run: |
          set -e
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "Frontend deployed successfully"
          echo "Site: https://blackjack21.site"
          echo "CloudFront invalidation created"
