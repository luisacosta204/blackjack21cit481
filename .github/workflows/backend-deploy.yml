      - name: Setup SSH key
        shell: bash
        run: |
          set -e
          echo "HOME=$HOME"
          test -n "${{ secrets.EC2_SSH_KEY }}"
          test -n "${{ secrets.EC2_HOST }}"
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > "$HOME/.ssh/ec2_key.pem"
          chmod 600 "$HOME/.ssh/ec2_key.pem"
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> "$HOME/.ssh/known_hosts"

      - name: Deploy to EC2
        shell: bash
        run: |
          scp -i "$HOME/.ssh/ec2_key.pem" server/backend-deploy.tar.gz ec2-user@${{ secrets.EC2_HOST }}:/tmp/

          ssh -i "$HOME/.ssh/ec2_key.pem" ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            echo "Extracting deployment package..."
            cd /home/ec2-user/blackjack21cit481/server
            tar -xzf /tmp/backend-deploy.tar.gz
            rm /tmp/backend-deploy.tar.gz

            echo "Installing production dependencies..."
            npm ci --production

            echo "Restarting PM2 process..."
            pm2 restart blackjack-backend

            echo "Waiting for process to stabilize..."
            sleep 5

            echo "Deployment complete!"
            pm2 list
          EOF