name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Build backend
        working-directory: ./server
        run: npm run build

      - name: Create deployment package
        working-directory: ./server
        run: |
          set -e
          rm -rf deploy backend-deploy.tar.gz
          mkdir -p deploy
          cp -r dist package.json package-lock.json deploy/
          cd deploy
          tar -czf ../backend-deploy.tar.gz .
          cd ..
          ls -lh backend-deploy.tar.gz

      - name: Setup SSH key
        shell: bash
        run: |
          set -e
          test -n "${{ secrets.EC2_SSH_KEY }}"
          test -n "${{ secrets.EC2_HOST }}"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > "$HOME/.ssh/ec2_key.pem"
          chmod 600 "$HOME/.ssh/ec2_key.pem"
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Deploy to EC2
        shell: bash
        run: |
          set -e
          scp -i "$HOME/.ssh/ec2_key.pem" -o StrictHostKeyChecking=yes server/backend-deploy.tar.gz ec2-user@${{ secrets.EC2_HOST }}:/tmp/

          ssh -i "$HOME/.ssh/ec2_key.pem" -o StrictHostKeyChecking=yes ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            echo "Extracting deployment package..."
            cd /home/ec2-user/blackjack21cit481/server
            tar -xzf /tmp/backend-deploy.tar.gz
            rm /tmp/backend-deploy.tar.gz

            echo "Installing production dependencies..."
            npm ci --production

            echo "Restarting PM2 process..."
            pm2 restart blackjack-backend

            echo "Waiting for process to stabilize..."
            sleep 5

            echo "Deployment complete"
            pm2 list
          EOF

      - name: Health check
        shell: bash
        run: |
          set -e
          echo "Running health check..."
          sleep 3
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://api.blackjack21.site/health || true)

          if [ "$RESPONSE" = "200" ]; then
            echo "Health check passed"
          else
            echo "Health check returned status code: $RESPONSE"
            exit 1
          fi
