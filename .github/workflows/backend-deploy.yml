name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Build backend
        working-directory: ./server
        run: npm run build

      - name: Create deployment package
        working-directory: ./server
        run: |
          mkdir -p deploy
          cp -r dist package.json package-lock.json deploy/
          cd deploy
          tar -czf ../backend-deploy.tar.gz .
          cd ..
          ls -lh backend-deploy.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          # Upload the deployment package
          scp -i ~/.ssh/ec2_key.pem server/backend-deploy.tar.gz ec2-user@${{ secrets.EC2_HOST }}:/tmp/
          
          # SSH and deploy
          ssh -i ~/.ssh/ec2_key.pem ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            
            echo "📦 Extracting deployment package..."
            cd /home/ec2-user/blackjack21cit481/server
            tar -xzf /tmp/backend-deploy.tar.gz
            rm /tmp/backend-deploy.tar.gz
            
            echo "📚 Installing production dependencies..."
            npm ci --production
            
            echo "🔄 Restarting PM2 process..."
            pm2 restart blackjack-backend
            
            echo "⏳ Waiting for process to stabilize..."
            sleep 5
            
            echo "✅ Deployment complete!"
            pm2 list
          EOF

      - name: Health check
        run: |
          echo "🏥 Running health check..."
          sleep 3
          
          # Try to hit the health endpoint
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://api.blackjack21.site/health || echo "000")
          
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Health check passed! Backend is responding."
          else
            echo "⚠️ Health check returned status code: $RESPONSE"
            echo "Backend may still be starting up. Check PM2 logs on EC2."
            exit 1
          fi

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Backend deployed successfully!"
          echo "🌐 API: https://api.blackjack21.site"
          echo "🔍 Check logs: ssh ec2-user@${{ secrets.EC2_HOST }} 'pm2 logs blackjack-backend'"
